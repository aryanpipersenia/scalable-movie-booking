version: '3.8'

services:
  # MySQL Database for relational data (Users, Theaters, Shows, Bookings)
  mysql:
    image: mysql:8.0
    container_name: movie-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: movie_booking_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Redis for Distributed Seat Locking and Catalog Caching
  redis:
    image: redis:alpine
    container_name: movie-redis
    ports:
      - "6379:6379"

  # RabbitMQ for Async Payments and Notifications
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: movie-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Message broker port
      - "15672:15672" # Management UI port

volumes:
  mysql_data: